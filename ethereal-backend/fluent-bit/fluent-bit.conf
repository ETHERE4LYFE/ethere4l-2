[SERVICE]
    Flush        1
    Log_Level    info
    Parsers_File parsers.conf

[INPUT]
    Name         forward
    Listen       0.0.0.0
    Port         24224

# For Docker json-file logs mapped via volume:
# [INPUT]
#     Name              tail
#     Path              /var/lib/docker/containers/*/*.log
#     Parser            docker
#     Docker_Mode       On

[OUTPUT]
    Name         stdout
    Match        *

# Future: Route to S3 or Elasticsearch.
# [OUTPUT]
#     Name s3
#     Match *
#     bucket your-logs-bucket
#     region us-east-1
