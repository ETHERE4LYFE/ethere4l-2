# =========================================================
# ETHERE4L Backend — Docker Compose
# =========================================================
# Local development & production deployment
# SQLite data persisted via volume mount
# =========================================================

version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ethere4l-backend
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_PASS_HASH=${ADMIN_PASS_HASH}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-ethere4lyfe@gmail.com}
      - FRONTEND_URL=${FRONTEND_URL:-https://ethere4l.com}
      - COOKIE_DOMAIN=${COOKIE_DOMAIN}
      - IP_HASH_PEPPER=${IP_HASH_PEPPER:-defaultProdPepper123}
      - ENABLE_METRICS=true
      - DATABASE_URL=postgresql://ethere4l:strongpassword@postgres:5432/ethere4l_db
    volumes:
      - ./logs:/app/logs
    networks:
      - internal
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/health/live', (res) => res.statusCode === 200 ? process.exit(0) : process.exit(1)).on('error', () => process.exit(1))\"" ]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  postgres:
    image: postgres:15-alpine
    container_name: ethere4l-postgres
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    restart: unless-stopped
    environment:
      POSTGRES_USER: ethere4l
      POSTGRES_PASSWORD: strongpassword
      POSTGRES_DB: ethere4l_db
    networks:
      - internal
      - default
    ports:
      - "5434:5432"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    volumes:
      - postgres_data:/var/lib/postgresql/data

  prometheus:
    image: prom/prometheus:latest
    container_name: ethere4l-prometheus
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - internal
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: ethere4l-grafana
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    networks:
      - internal
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    restart: unless-stopped

  fluent-bit:
    image: fluent/fluent-bit:latest
    container_name: ethere4l-fluent-bit
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    volumes:
      - ./fluent-bit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf
      # Mount Docker socket or log paths depending on exact setup.
      # Because fluent-bit must NOT store local rotated files itself (Rule 2B),
      # it just forwards.
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    networks:
      - internal
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    restart: unless-stopped

networks:
  internal:
    internal: true

volumes:
  postgres_data:
